name: Dependabot Changelog

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  dependabot-changelog:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog entry
        uses: dangoslen/dependabot-changelog-helper@291c8cb629d7cd7b57ea065782c435ec2bedb138 # v4.3.0
        with:
          activationLabels: "dependencies"
          changelogPath: "./CHANGELOG.md"
          entryPrefix: "Bump"
          sectionHeader: "Dependencies"
          version: "Unreleased"

      - name: Commit changelog entry
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "docs(CHANGELOG.md): add dependency bump from dependabot"
