name: Dependabot Changelog

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  dependabot-changelog:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog entry
        uses: dangoslen/dependabot-changelog-helper@291c8cb629d7cd7b57ea065782c435ec2bedb138 # v4.3.0
        with:
          activationLabels: "dependencies"
          changelogPath: "./CHANGELOG.md"
          entryPrefix: "Bump"
          sectionHeader: "Dependencies"
          version: "Unreleased"

      - name: Commit changelog entry
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "docs(CHANGELOG.md): add dependency bump from dependabot"
