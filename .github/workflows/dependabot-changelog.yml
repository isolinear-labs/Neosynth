name: Dependabot Changelog

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  dependabot-changelog:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog entry
        uses: dangoslen/dependabot-changelog-helper@v4
        with:
          activationLabels: "dependencies"
          changelogPath: "./CHANGELOG.md"
          entryPrefix: "Bump"
          sectionHeader: "Dependencies"
          version: "Unreleased"

      - name: Commit changelog entry
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs(CHANGELOG.md): add dependency bump from dependabot"
